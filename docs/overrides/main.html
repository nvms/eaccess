{% extends "base.html" %}

{% block extrahead %}
  {{ super() }}
  <style>
    [data-md-color-scheme="slate"] {
      --md-default-bg-color: #000000;
      --md-default-bg-color--light: #141414;
      --md-default-bg-color--lighter: #1a1a1a;
      --md-default-bg-color--lightest: #222222;
      --md-code-bg-color: #141414;
      --md-code-hl-color: rgba(255, 255, 255, 0.05);
      --md-primary-fg-color: #0d0d0d;
      --md-primary-fg-color--light: #141414;
      --md-primary-fg-color--dark: #000000;
    }
    [data-md-color-scheme="slate"] .md-nav__link--active,
    [data-md-color-scheme="slate"] .md-nav__link:is([href="#"]) {
      color: var(--md-accent-fg-color);
    }
    [data-md-color-scheme="slate"] .md-header,
    [data-md-color-scheme="slate"] .md-tabs {
      background-color: #000000;
    }
    .llms-txt-link {
      color: var(--md-primary-bg-color);
      text-decoration: none;
      font-size: 0.65rem;
      font-weight: 500;
      opacity: 0.7;
      white-space: nowrap;
      padding: 0.4rem;
      transition: opacity 0.2s;
    }
    .llms-txt-link:hover {
      opacity: 1;
    }
  </style>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const headerOption = document.querySelector('.md-header__option');
      if (headerOption) {
        const link = document.createElement('a');
        link.href = '{{ config.site_url }}llms.txt';
        link.className = 'md-header__button llms-txt-link';
        link.textContent = 'llms.txt';
        link.title = 'View llms.txt';
        headerOption.parentNode.insertBefore(link, headerOption);
      }
    });
  </script>
{% endblock %}
