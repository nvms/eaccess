site_name: eaccess auth
site_description: session-first express auth with admin ui, mfa, roles, oauth, and multi-tenant-friendly user mapping
site_url: https://nvms.github.io/eaccess/

plugins:
  - search
  - pygments:
      light: solarized-light
      dark: lightbulb
  - llmstxt:
      markdown_description: |
        Express authentication middleware for PostgreSQL sessions. Provides registration, login, roles, MFA, OAuth providers, remember-me, and an admin UI. Maps to your own user table via optional user_id.
      sections:
        Getting Started:
          - index.md: project overview and core principles
          - quick-start.md: installation and basic setup
        Core Concepts:
          - concepts/index.md: fundamentals
          - concepts/sessions.md: sessions and resync
          - concepts/registration.md: registration and confirmation
          - concepts/authentication.md: login flows and MFA
          - concepts/roles.md: roles and permissions
          - concepts/multi-tenant.md: mapping user_id for external tenants
          - concepts/providers.md: oauth providers
          - concepts/standalone.md: standalone auth without express context
        Guides:
          - guides/express-middleware.md: using the middleware
          - guides/admin-ui.md: running the admin ui
          - guides/mfa.md: 2fa setup and ux patterns
        API Reference:
          - api/index.md: api surface overview
          - api/errors.md: comprehensive list of errors thrown. when and why

theme:
  name: material
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: lime
      toggle:
        icon: material/brightness-4
        name: switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Quick Start: quick-start.md
  - Core Concepts:
      - Overview: concepts/index.md
      - Sessions & Resync: concepts/sessions.md
      - Registration & Confirmation: concepts/registration.md
      - Authentication & MFA: concepts/authentication.md
      - Roles: concepts/roles.md
      - Multi-Tenant Mapping: concepts/multi-tenant.md
      - OAuth Providers: concepts/providers.md
      - Standalone Auth: concepts/standalone.md
  - Guides:
      - Express Middleware: guides/express-middleware.md
      - Admin UI: guides/admin-ui.md
      - MFA Patterns: guides/mfa.md
  - API:
      - Reference: api/index.md
      - Errors: api/errors.md
